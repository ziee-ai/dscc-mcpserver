# Overlay that turns on JWT auth + admin REST + admin SPA.
# Usage:
#   export MCPSERVER_ADMIN_TOKEN=$(openssl rand -hex 32)
#   docker compose -f docker-compose.yaml -f docker-compose.auth.yaml up -d --build
#
# The bootstrap token is REQUIRED — the compose file fails fast if it is
# unset so production deploys never accidentally launch with an
# auto-generated token that doesn't survive container restart.

services:
  dscc-mcpserver:
    environment:
      DSCC_AUTH: "on"
      # `${VAR:?msg}` exits with the message if VAR is unset.
      MCPSERVER_ADMIN_TOKEN: "${MCPSERVER_ADMIN_TOKEN:?MCPSERVER_ADMIN_TOKEN is required when running the auth overlay}"
      DSCC_AUTH_DB: "/var/lib/dscc/auth/auth.db"
      # Optional overrides; defaults are derived inside the container.
      # DSCC_AUTH_ISSUER: "https://dscc.example.com"
      # DSCC_AUTH_AUDIENCE: "dscc"
      # DSCC_AUTH_UI: "on"
    volumes:
      - dscc-auth:/var/lib/dscc/auth

volumes:
  dscc-auth:
