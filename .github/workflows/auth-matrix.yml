name: auth matrix

# Runs the dscc.mcpserver test + smoke suite in both auth modes:
#   - R `devtools::test()` with DSCC_AUTH unset (default)
#   - R `devtools::test()` with DSCC_AUTH=on
#   - Docker smoke (`docker-smoke.sh`) against the default image
#   - Docker smoke (`docker-smoke-auth.sh`) against the auth overlay
#
# All four must pass on every PR / push to main.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  r-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        mode:
          - { name: "auth-off", env: { DSCC_AUTH: "off" } }
          - { name: "auth-on",  env: { DSCC_AUTH: "on" } }
    steps:
      - uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "release"
          use-public-rspm: true

      - name: Install R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::DBI
            any::RSQLite
            any::processx
            any::withr
            any::testthat
            any::mockery
            any::httr2
            any::mirai
            any::nanonext
            any::promises
            any::jsonlite
            any::openssl
            any::devtools
            any::magrittr
            any::matrixStats
            any::SNFtool
            any::igraph
            any::cluster
            any::survival
            any::RhpcBLASctl

      - name: Install mcpserver (peer package)
        # The mcpserver source tarball lives at the repo root. To refresh it:
        #   (cd ../mcpserver-r && R CMD build --no-build-vignettes --no-manual .)
        #   cp ../mcpserver-r/mcpserver_*.tar.gz .
        #   git add mcpserver_*.tar.gz && git commit -m "bump mcpserver"
        run: |
          if [ -f mcpserver_*.tar.gz ]; then
            R CMD INSTALL mcpserver_*.tar.gz
          else
            echo "::error::no mcpserver_*.tar.gz checked in. Rebuild it from ../mcpserver-r and commit."
            exit 1
          fi

      - name: Install dscc.mcpserver
        run: R CMD INSTALL --no-test-load .

      - name: Run testthat (${{ matrix.mode.name }})
        env:
          NOT_CRAN: "true"
          DSCC_AUTH: ${{ matrix.mode.env.DSCC_AUTH }}
          DSCC_RUN_TEMPLATE_TESTS: "1"
        run: |
          Rscript -e 'pkgload::load_all(quiet = TRUE); res <- as.data.frame(testthat::test_dir("tests/testthat", reporter = "summary", stop_on_failure = TRUE)); cat(sprintf("\nfail=%d pass=%d skip=%d\n", sum(res$failed), sum(res$passed), sum(res$skipped)))'

  docker-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        smoke:
          - script: tests/protocol/docker-smoke.sh
            name: auth-off
          - script: tests/protocol/docker-smoke-auth.sh
            name: auth-on
    steps:
      - uses: actions/checkout@v4

      - name: Verify mcpserver tarball is present
        run: |
          if [ ! -f mcpserver_*.tar.gz ]; then
            echo "::error::no mcpserver_*.tar.gz checked in; cannot build the image."
            exit 1
          fi

      - name: Build image
        run: docker build -t dscc-mcpserver:test .

      - name: Run ${{ matrix.smoke.name }} smoke
        run: |
          if [ "${{ matrix.smoke.name }}" = "auth-on" ]; then
            export MCPSERVER_ADMIN_TOKEN=$(openssl rand -hex 32)
          fi
          bash ${{ matrix.smoke.script }} dscc-mcpserver:test
