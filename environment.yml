# Conda environment for running and testing dscc.mcpserver locally.
#
#   conda env create -f environment.yml
#   # install the mcpserver framework from the ziee-ai drat
#   conda run -n dscc-mcp Rscript -e 'install.packages("mcpserver", repos=c("https://ziee-ai.github.io/drat", getOption("repos")))'
#   conda run -n dscc-mcp R CMD INSTALL .
#   conda run -n dscc-mcp Rscript inst/run-http.R
#
# NEMO's nemo.num.clusters is vendored in inst/dscc, so NEMO itself is not
# a dependency. mcpserver is not bundled; install it from the ziee-ai drat
# as shown above.
name: dscc-mcp
channels:
  - conda-forge
  - bioconda
dependencies:
  - r-base>=4.3
  # build toolchain (compiling any source-only R packages)
  - make
  - pkg-config
  # MCP framework runtime deps
  - r-r6
  - r-jsonlite
  - r-jsonvalidate
  - r-httr2
  - r-processx
  - r-mirai
  - r-nanonext
  - r-promises
  - r-later
  - r-jose
  - r-openssl
  - r-dbi
  - r-rsqlite
  # DSCC scientific deps (nemo.num.clusters is vendored)
  - r-magrittr
  - r-matrixstats
  - r-snftool
  - r-igraph
  - r-cluster
  - r-survival
  - r-rhpcblasctl
  # test + build tooling
  - r-testthat
  - r-withr
  - r-mockery
  - r-devtools
  - r-roxygen2
