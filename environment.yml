# Conda environment for running and testing dscc.mcpserver locally.
#
#   conda env create -f environment.yml
#   conda run -n dscc-mcp R CMD INSTALL mcpserver_0.1.0.tar.gz
#   conda run -n dscc-mcp R CMD INSTALL .
#   conda run -n dscc-mcp Rscript inst/run-http.R
#
# NEMO's nemo.num.clusters is vendored in inst/dscc, so NEMO itself is not
# a dependency. mcpserver is installed from the bundled tarball (above),
# not from conda.
name: dscc-mcp
channels:
  - conda-forge
  - bioconda
dependencies:
  - r-base>=4.3
  # build toolchain (compiling any source-only R packages)
  - make
  - pkg-config
  # MCP framework runtime deps
  - r-r6
  - r-jsonlite
  - r-jsonvalidate
  - r-httr2
  - r-processx
  - r-mirai
  - r-nanonext
  - r-promises
  - r-later
  - r-jose
  - r-openssl
  - r-dbi
  - r-rsqlite
  # DSCC scientific deps (nemo.num.clusters is vendored)
  - r-magrittr
  - r-matrixstats
  - r-snftool
  - r-igraph
  - r-cluster
  - r-survival
  - r-rhpcblasctl
  # test + build tooling
  - r-testthat
  - r-withr
  - r-mockery
  - r-devtools
  - r-roxygen2
